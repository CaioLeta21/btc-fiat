name: Deploy to fiat.letabuild.com

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 163.176.61.70
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          source: dist/
          target: /var/www/fiat
          strip_components: 1
          rm: true
